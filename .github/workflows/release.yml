name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-tarball:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: curl, json, pdo_sqlite, openssl
          tools: composer:v2
      - name: Sync VERSION file to tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${REF_NAME#v}"
          echo "$VERSION" > VERSION
      - name: Install runtime dependencies
        run: composer install --no-interaction --no-dev --prefer-dist --optimize-autoloader
      - name: Create tarball
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${REF_NAME#v}"
          DIST="zonemirror-${VERSION}"
          mkdir -p "dist/${DIST}"
          rsync -a \
            --exclude='.git' --exclude='.github' --exclude='tests' \
            --exclude='node_modules' --exclude='dist' --exclude='*.log' \
            --exclude='.phpunit.cache' --exclude='coverage*' \
            ./ "dist/${DIST}/"
          (cd dist && tar -czf "${DIST}.tar.gz" "${DIST}" && sha256sum "${DIST}.tar.gz" > "${DIST}.tar.gz.sha256")
      - uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          generate_release_notes: true
